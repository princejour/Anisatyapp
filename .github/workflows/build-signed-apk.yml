name: Build signed APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - principal

env:
  GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Download Gradle
        run: |
          curl -L -o gradle.zip https://services.gradle.org/distributions/gradle-9.3.1-bin.zip
          unzip -q gradle.zip

      - name: Restore signing key
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > my-upload-key.jks

      - name: Restore Firebase config if provided
        if: ${{ env.GOOGLE_SERVICES_JSON != '' }}
        run: |
          printf '%s' "$GOOGLE_SERVICES_JSON" > app/google-services.json

      - name: Build signed release APK
        run: ./gradle-9.3.1/bin/gradle :app:assembleRelease
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/my-upload-key.jks
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Upload signed APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Anisaty-signed-release-apk
          path: app/build/outputs/apk/release/*.apk
