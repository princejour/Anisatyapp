name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Repair Gradle Wrapper
      run: |
        rm -f gradle/wrapper/gradle-wrapper.jar
        gradle wrapper --gradle-version 9.3.1

    - name: Set parent button image
      run: |
        mkdir -p app/src/main/res/drawable-nodpi
        cat > /tmp/btn_parents.b64 <<'B64'
        
        B64
        base64 -d /tmp/btn_parents.b64 > app/src/main/res/drawable-nodpi/btn_parents.jpg
        cat > app/src/main/res/drawable/parents_badge.xml <<'XML'
        <?xml version="1.0" encoding="utf-8"?>
        <bitmap xmlns:android="http://schemas.android.com/apk/res/android"
            android:src="@drawable/btn_parents"
            android:gravity="center"
            android:antialias="true" />
        XML

    - name: Generate Debug Keystore
      run: |
        keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"

    - name: Build Debug APK
      run: ./gradlew assembleDebug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
