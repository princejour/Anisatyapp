name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Repair Gradle Wrapper
      run: |
        rm -f gradle/wrapper/gradle-wrapper.jar
        gradle wrapper --gradle-version 9.3.1

    - name: Generate image assets
      run: |
        python3 - <<'PY'
        import base64
        import runpy
        original_b64decode = base64.b64decode
        def safe_b64decode(data):
            if isinstance(data, str):
                data = data + "=" * (-len(data) % 4)
            return original_b64decode(data)
        base64.b64decode = safe_b64decode
        runpy.run_path("scripts/generate_image_assets.py", run_name="__main__")
        PY
        sed -i 's/@drawable\/app_icon/@drawable\/launcher_teacher/g' app/src/main/AndroidManifest.xml

    - name: Generate Debug Keystore
      run: |
        keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"

    - name: Build Debug APK
      run: ./gradlew assembleDebug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
