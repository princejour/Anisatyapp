name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Download Gradle 9.3.1 manually
        run: |
          wget https://services.gradle.org/distributions/gradle-9.3.1-bin.zip -O gradle-9.3.1-bin.zip
          unzip -q gradle-9.3.1-bin.zip

      - name: Build Debug APK
        run: ./gradle-9.3.1/bin/gradle :app:assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/*.apk
